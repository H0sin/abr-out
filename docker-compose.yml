name: abr-out

x-app-env: &app-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT}
  BOT_TOKEN: ${BOT_TOKEN}
  XUI_BASE_URL: ${XUI_BASE_URL}
  XUI_USERNAME: ${XUI_USERNAME}
  XUI_PASSWORD: ${XUI_PASSWORD}
  XUI_PANEL_HOST_PUBLIC: ${XUI_PANEL_HOST_PUBLIC}
  API_HOST: ${API_HOST}
  API_PORT: ${API_PORT}
  API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN}
  ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
  REQUIRED_CHANNEL: ${REQUIRED_CHANNEL:-}
  REQUIRED_CHANNEL_URL: ${REQUIRED_CHANNEL_URL:-}
  BACKUP_BOT_TOKEN: ${BACKUP_BOT_TOKEN:-}
  BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
  COMMISSION_PCT: ${COMMISSION_PCT}
  MIN_TOPUP_USD: ${MIN_TOPUP_USD}
  TRAFFIC_POLL_INTERVAL_SEC: ${TRAFFIC_POLL_INTERVAL_SEC}
  NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY}
  NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET}
  WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL}
  DOMAIN: ${DOMAIN}
  LOG_LEVEL: ${LOG_LEVEL}
  # --- USDT-BSC withdrawals + admin wallet view ---
  # Use :- so missing .env vars fall through to the pydantic defaults in
  # app/common/settings.py instead of being passed as empty strings (which
  # would fail Decimal/int validation).
  BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed1.binance.org}
  BSC_HOT_WALLET_PRIVATE_KEY: ${BSC_HOT_WALLET_PRIVATE_KEY:-}
  BSC_USDT_CONTRACT: ${BSC_USDT_CONTRACT:-0x55d398326f99059fF775485246999027B3197955}
  BSCSCAN_API_KEY: ${BSCSCAN_API_KEY:-}
  BSCSCAN_BASE_URL: ${BSCSCAN_BASE_URL:-https://api.etherscan.io/v2/api}
  WITHDRAWAL_MIN_USD: ${WITHDRAWAL_MIN_USD:-1}
  WITHDRAWAL_MAX_USD: ${WITHDRAWAL_MAX_USD:-1000}
  WITHDRAWAL_MAX_USD_PER_DAY: ${WITHDRAWAL_MAX_USD_PER_DAY:-5000}
  WITHDRAWAL_GAS_LIMIT: ${WITHDRAWAL_GAS_LIMIT:-80000}
  WITHDRAWAL_FEE_BUFFER_PCT: ${WITHDRAWAL_FEE_BUFFER_PCT:-1.20}
  WITHDRAWAL_SUBMITTING_RECOVERY_MIN: ${WITHDRAWAL_SUBMITTING_RECOVERY_MIN:-5}
  WITHDRAWAL_SUBMITTED_ALERT_MIN: ${WITHDRAWAL_SUBMITTED_ALERT_MIN:-60}
  AUTO_WITHDRAW_THRESHOLD_COOLDOWN_MIN: ${AUTO_WITHDRAW_THRESHOLD_COOLDOWN_MIN:-60}
  BNB_PRICE_FEED_URL: ${BNB_PRICE_FEED_URL:-https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # TEMP: exposed publicly for development. Close this before going to prod.
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${IMAGE:-ghcr.io/h0sin/abr-out:latest}
    pull_policy: always
    command: ["alembic", "upgrade", "head"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${IMAGE:-ghcr.io/h0sin/abr-out:latest}
    pull_policy: always
    restart: unless-stopped
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"

  bot:
    image: ${IMAGE:-ghcr.io/h0sin/abr-out:latest}
    pull_policy: always
    restart: unless-stopped
    command: ["python", "-m", "app.bot.main"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started

  worker:
    image: ${IMAGE:-ghcr.io/h0sin/abr-out:latest}
    pull_policy: always
    restart: unless-stopped
    command: ["python", "-m", "app.worker.main"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
