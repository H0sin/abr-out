name: abr-out

# Production overlay: pulls image from GHCR instead of building locally.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    image: ${IMAGE:-ghcr.io/h0sin/abr-out:latest}
    build: !reset null
    pull_policy: always

  bot:
    image: ${IMAGE:-ghcr.io/h0sin/abr-out:latest}
    build: !reset null
    pull_policy: always

  worker:
    image: ${IMAGE:-ghcr.io/h0sin/abr-out:latest}
    build: !reset null
    pull_policy: always
